version: '3.8'

services:
  agileai-api:
    build: .
    container_name: agileai-api
    ports:
      - "8000:8000"
    environment:
      AGILEAI_DB_PATH: /app/data/agileai.db
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:
  logs:
